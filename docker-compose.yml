services:

  db:
    image: postgres:16-alpine
    container_name: ciosuseradd_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: ciosuseradd_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FTPD_PASSWD_PATH: /ftpshared/ftpd.passwd
      FTP_UID: ${FTP_UID}
      FTP_GID: ${FTP_GID}
      ALLOWED_ORIGINS_STR: ${ALLOWED_ORIGINS}
    volumes:
      - ftpshared:/ftpshared
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - db

  frontend:
    build: ./frontend
    container_name: ciosuseradd_frontend
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: ciosuseradd_nginx
    restart: unless-stopped
    ports:
      - "${BIND_IP}:${LISTEN_PORT:-8222}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  db_data:
  ftpshared:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${FTPD_PASSWD_DIR}

networks:
  internal:
    driver: bridge
  db:
    driver: bridge
    internal: true
