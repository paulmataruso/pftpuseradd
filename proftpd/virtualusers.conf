# ProFTPd Virtual User Config Fragment
#
# Drop this file on your FTP server at:
#   /etc/proftpd/conf.d/virtualusers.conf
#
# Then reload ProFTPd:
#   sudo systemctl reload proftpd
#
# Edit FTP_ROOT to match your actual FTP root directory before deploying.
# ─────────────────────────────────────────────────────────────────────────────
#
# Access model:
#   FTP_ROOT/           — authenticated virtual users: read/list only
#   FTP_ROOT/upload/    — upload and mkdir allowed, delete/rename denied
#
# Requirements in proftpd.conf:
#   AuthOrder         mod_auth_file.c mod_auth_unix.c
#   AuthUserFile      /etc/proftpd/ftpd.passwd
#   RequireValidShell off

# ── Edit this path to match your FTP root ────────────────────────────────────
# Example: /srv/ftp, /var/ftp, /mnt/storage/ftp
#
# Replace /path/to/your/ftp/root with your actual path in ALL three
# <Directory> blocks below.
# ─────────────────────────────────────────────────────────────────────────────

# Chroot all authenticated virtual users to the FTP root
DefaultRoot /path/to/your/ftp/root

# Root — read and list only, no writes
<Directory /path/to/your/ftp/root>
  <Limit WRITE DELE RNFR RNTO MKD RMD XMKD XRMD>
    DenyAll
  </Limit>
</Directory>

# Upload directory — store and mkdir allowed, delete/rename denied
<Directory /path/to/your/ftp/root/upload>
  <Limit STOR APPE MKD XMKD>
    AllowAll
  </Limit>
  <Limit DELE RNFR RNTO RMD XRMD>
    DenyAll
  </Limit>
</Directory>

# Optional: block a specific directory entirely (e.g. a web app directory)
# Uncomment and set the path to hide it from FTP users
#<Directory /path/to/your/ftp/root/hidden_dir>
#  <Limit ALL>
#    DenyAll
#  </Limit>
#</Directory>
