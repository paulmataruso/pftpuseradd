worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size  64k;
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    map $http_x_real_ip $real_client_ip {
        default  $http_x_real_ip;
        ""       $remote_addr;
    }

    limit_req_zone $real_client_ip zone=register:10m rate=5r/m;
    limit_req_zone $real_client_ip zone=api:10m      rate=30r/m;
    limit_req_zone $real_client_ip zone=admin:10m    rate=5r/m;

    log_format main '$real_client_ip - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name _;

        set $backend_upstream  "http://backend:8000";
        set $frontend_upstream "http://frontend:80";

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

        location = /api/register {
            limit_req zone=register burst=3 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         $backend_upstream;
            proxy_set_header   X-Forwarded-For $real_client_ip;
            proxy_set_header   X-Real-IP       $real_client_ip;
            proxy_set_header   Host            $host;
            proxy_read_timeout 30s;
        }

        location = /api/admin/login {
            limit_req zone=admin burst=3 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         $backend_upstream;
            proxy_set_header   X-Forwarded-For $real_client_ip;
            proxy_set_header   X-Real-IP       $real_client_ip;
            proxy_set_header   Host            $host;
            proxy_read_timeout 30s;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         $backend_upstream;
            proxy_set_header   X-Forwarded-For $real_client_ip;
            proxy_set_header   X-Real-IP       $real_client_ip;
            proxy_set_header   Host            $host;
            proxy_read_timeout 30s;
        }

        location / {
            proxy_pass       $frontend_upstream;
            proxy_set_header Host $host;
        }
    }
}
